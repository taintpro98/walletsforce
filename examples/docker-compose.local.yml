# Local dev stack: a single-image Hardhat project that (1) runs a local EVM node
# and (2) deploys the demo contracts to it.
#
#   docker compose -f docker-compose.local.yml up --build
#
# `chain`  stays up on :8545 with deterministic, funded dev accounts.
# `deploy` runs once, deploys Counter + DemoToken, writes contracts/deployments/local.json, then exits.
#
# walletsforce examples can then point at http://localhost:8545 (chainId 31337)
# and use dev account #0 (key 0xac09…ff80) — the same key the other examples use.

name: walletsforce-local

services:
  chain:
    build: ./contracts
    image: walletsforce-example-contracts:local
    command: ["npx", "hardhat", "node", "--hostname", "0.0.0.0"]
    ports:
      - "8545:8545"
    healthcheck:
      # node:slim has no curl/wget — probe JSON-RPC with Node's built-in fetch.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:8545',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_blockNumber',params:[]})}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 3s
      timeout: 4s
      retries: 20
      start_period: 5s

  deploy:
    image: walletsforce-example-contracts:local
    depends_on:
      chain:
        condition: service_healthy
    environment:
      RPC_URL: "http://chain:8545"
      # Dev account #0 (PUBLIC test key — never use with real funds).
      PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    command: ["npx", "hardhat", "run", "scripts/deploy.ts", "--network", "local"]
    volumes:
      # Publish the generated resources (addresses + ABIs) to examples/deployments/
      # on the host. This is what local.ts consumes — it never touches the
      # contracts project, and never deploys anything itself.
      - ./deployments:/app/deployments
